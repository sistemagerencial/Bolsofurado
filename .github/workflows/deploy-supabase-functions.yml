name: Deploy Supabase Functions

on:
  push:
    branches: [ main ]

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-action@v1
        with:
          supabase-version: 'latest'

      - name: Supabase login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token $SUPABASE_ACCESS_TOKEN

      - name: Deploy Functions
        run: |
          supabase functions deploy create-payment --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify
          supabase functions deploy mercadopago-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify
          supabase functions deploy payment-reconciliation --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify
          supabase functions deploy send-welcome-email --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify

  deploy-static:
    if: always()
    runs-on: ubuntu-latest
    needs: deploy-functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
