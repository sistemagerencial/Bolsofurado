name: Set Repository Secrets

on:
  workflow_dispatch:
    inputs:
      secret_creator_pat:
        description: 'Personal Access Token com permissões repo (necessário para criar secrets)'
        required: true
      supabase_access_token:
        description: 'Valor para SUPABASE_ACCESS_TOKEN'
        required: false
      supabase_project_ref:
        description: 'Valor para SUPABASE_PROJECT_REF'
        required: false
      vercel_token:
        description: 'Valor para VERCEL_TOKEN'
        required: false
      vercel_org_id:
        description: 'Valor para VERCEL_ORG_ID'
        required: false
      vercel_project_id:
        description: 'Valor para VERCEL_PROJECT_ID'
        required: false
      mercadopago_access_token:
        description: 'Valor para MERCADOPAGO_ACCESS_TOKEN'
        required: false
      mp_webhook_secret:
        description: 'Valor para MP_WEBHOOK_SECRET'
        required: false
      resend_api_key:
        description: 'Valor para RESEND_API_KEY'
        required: false

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Create/Update SUPABASE_ACCESS_TOKEN
        if: ${{ github.event.inputs.supabase_access_token != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: SUPABASE_ACCESS_TOKEN
          secret-value: ${{ github.event.inputs.supabase_access_token }}

      - name: Create/Update SUPABASE_PROJECT_REF
        if: ${{ github.event.inputs.supabase_project_ref != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: SUPABASE_PROJECT_REF
          secret-value: ${{ github.event.inputs.supabase_project_ref }}

      - name: Create/Update VERCEL_TOKEN
        if: ${{ github.event.inputs.vercel_token != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: VERCEL_TOKEN
          secret-value: ${{ github.event.inputs.vercel_token }}

      - name: Create/Update VERCEL_ORG_ID
        if: ${{ github.event.inputs.vercel_org_id != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: VERCEL_ORG_ID
          secret-value: ${{ github.event.inputs.vercel_org_id }}

      - name: Create/Update VERCEL_PROJECT_ID
        if: ${{ github.event.inputs.vercel_project_id != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: VERCEL_PROJECT_ID
          secret-value: ${{ github.event.inputs.vercel_project_id }}

      - name: Create/Update MERCADOPAGO_ACCESS_TOKEN
        if: ${{ github.event.inputs.mercadopago_access_token != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: MERCADOPAGO_ACCESS_TOKEN
          secret-value: ${{ github.event.inputs.mercadopago_access_token }}

      - name: Create/Update MP_WEBHOOK_SECRET
        if: ${{ github.event.inputs.mp_webhook_secret != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: MP_WEBHOOK_SECRET
          secret-value: ${{ github.event.inputs.mp_webhook_secret }}

      - name: Create/Update RESEND_API_KEY
        if: ${{ github.event.inputs.resend_api_key != '' }}
        uses: peter-evans/create-or-update-secret@v4
        with:
          token: ${{ github.event.inputs.secret_creator_pat }}
          secret-name: RESEND_API_KEY
          secret-value: ${{ github.event.inputs.resend_api_key }}

      - name: Done
        run: echo "Secrets created/updated."
