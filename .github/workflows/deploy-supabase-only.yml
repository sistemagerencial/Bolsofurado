name: Deploy Supabase Functions Only

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-action@v1
        with:
          supabase-version: 'latest'

      - name: Supabase login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase login --token $SUPABASE_ACCESS_TOKEN

      - name: Deploy Supabase Functions
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy create-payment --project-ref $SUPABASE_PROJECT_REF --no-verify
          supabase functions deploy mercadopago-webhook --project-ref $SUPABASE_PROJECT_REF --no-verify
          supabase functions deploy payment-reconciliation --project-ref $SUPABASE_PROJECT_REF --no-verify
          supabase functions deploy send-welcome-email --project-ref $SUPABASE_PROJECT_REF --no-verify
